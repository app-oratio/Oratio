<div class="reading-toolbar" aria-label="Ferramentas de leitura">
  <div class="button-group" aria-label="Tamanho do texto">
    <button class="icon-button" type="button" data-prayer-font="decrease" aria-label="Diminuir texto">{% include icon.html name='minus' %}</button>
    <span aria-hidden="true">A</span>
    <button class="icon-button" type="button" data-prayer-font="increase" aria-label="Aumentar texto">{% include icon.html name='plus' %}</button>
  </div>
  <button class="button button--text button--small" type="button" data-copy-prayer>
    {% include icon.html name='copy' %}
    <span data-copy-prayer-label>{{ include.copy_label | default: 'Copiar oração' }}</span>
  </button>
  <button class="button button--text button--small" type="button" data-print-page>
    {% include icon.html name='print' %}
    <span>Imprimir</span>
  </button>
</div>
