{% assign icon_name = include.name | default: 'cross' %}
<svg class="icon icon--{{ icon_name }}" aria-hidden="true" viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
  {% case icon_name %}
    {% when 'menu' %}<path d="M4 7h16M4 12h16M4 17h16"/>
    {% when 'close' %}<path d="M6 6l12 12M18 6L6 18"/>
    {% when 'search' %}<circle cx="11" cy="11" r="6.5"/><path d="M16 16l4 4"/>
    {% when 'download' %}<path d="M12 3v12m0 0l-4-4m4 4l4-4M5 20h14"/>
    {% when 'copy' %}<rect x="8" y="8" width="11" height="12" rx="2"/><path d="M16 8V6a2 2 0 0 0-2-2H6a2 2 0 0 0-2 2v10a2 2 0 0 0 2 2h2"/>
    {% when 'share' %}<circle cx="18" cy="5" r="2.5"/><circle cx="6" cy="12" r="2.5"/><circle cx="18" cy="19" r="2.5"/><path d="M8.2 10.8l7.6-4.5M8.2 13.2l7.6 4.5"/>
    {% when 'print' %}<path d="M7 9V4h10v5M7 17H5a2 2 0 0 1-2-2v-4a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2v4a2 2 0 0 1-2 2h-2M7 14h10v7H7z"/>
    {% when 'check' %}<path d="M5 12.5l4.2 4.2L19 7"/>
    {% when 'reset' %}<path d="M4 10a8 8 0 1 1 2.3 7.7M4 4v6h6"/>
    {% when 'arrow-up' %}<path d="M12 19V5m0 0L6 11m6-6l6 6"/>
    {% when 'arrow-left' %}<path d="M19 12H5m0 0l6-6m-6 6l6 6"/>
    {% when 'arrow-right' %}<path d="M5 12h14m0 0l-6-6m6 6l-6 6"/>
    {% when 'plus' %}<path d="M12 5v14M5 12h14"/>
    {% when 'minus' %}<path d="M5 12h14"/>
    {% else %}<path d="M12 3v18M6 9h12"/>
  {% endcase %}
</svg>
