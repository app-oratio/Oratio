- id: "liturgia-diaria"
  category: "Liturgia"
  title: "Liturgia diária"
  description: "Acompanhe as leituras, o salmo responsorial, o Evangelho, as orações da celebração e as principais informações do calendário litúrgico de cada dia."
  image: "/assets/images/screenshots/02-liturgia-diaria.png"
  alt: "Tela da Liturgia diária no aplicativo Oratio"

- id: "liturgia-das-horas"
  category: "Liturgia"
  title: "Liturgia das Horas"
  description: "Reze a oração pública e oficial da Igreja ao longo do dia, com as diferentes horas litúrgicas apresentadas de maneira clara e organizada."
  image: "/assets/images/screenshots/03-liturgia-das-horas.png"
  alt: "Tela da Liturgia das Horas no aplicativo Oratio"

- id: "oracoes-tercos-rosarios"
  category: "Oração"
  title: "Orações, terços e rosários"
  description: "Encontre orações tradicionais, terços, rosários, ladainhas, consagrações e outras práticas de piedade para diferentes momentos da vida espiritual."
  image: "/assets/images/screenshots/04-oracoes-tercos-rosarios.png"
  alt: "Tela de orações, terços e rosários no aplicativo Oratio"

- id: "novenas"
  category: "Devoção"
  title: "Novenas"
  description: "Acompanhe novenas completas, com as orações organizadas por dia e recursos que ajudam a perseverar durante todo o período da devoção."
  image: "/assets/images/screenshots/05-novenas.png"
  alt: "Tela de novenas no aplicativo Oratio"

- id: "biblias"
  category: "Sagradas Escrituras"
  title: "Bíblias em português, latim e grego"
  description: "Leia diferentes edições das Sagradas Escrituras em português, latim e grego, reunidas em um ambiente confortável para leitura, estudo e oração."
  image: "/assets/images/screenshots/06-biblias.png"
  alt: "Tela de Bíblias em português, latim e grego no aplicativo Oratio"

- id: "santos"
  category: "Igreja"
  title: "Santos"
  description: "Conheça a vida, a espiritualidade e o testemunho dos santos, além de encontrar orações e conteúdos relacionados às suas celebrações."
  image: "/assets/images/screenshots/07-santos.png"
  alt: "Tela de histórias dos santos no aplicativo Oratio"

- id: "livros"
  category: "Formação"
  title: "Livros e biblioteca espiritual"
  description: "Acesse gratuitamente livros católicos, escritos dos santos e outras obras que ajudam no conhecimento, na formação e no aprofundamento da fé."
  image: "/assets/images/screenshots/08-livros.png"
  alt: "Tela de livros e biblioteca espiritual no aplicativo Oratio"

- id: "musicas"
  category: "Música sacra"
  title: "Músicas e cantos gregorianos"
  description: "Escute músicas sacras, hinos, cantos tradicionais e peças gregorianas que favorecem o recolhimento, a oração e a contemplação."
  image: "/assets/images/screenshots/09-musicas-cantos-gregorianos.png"
  alt: "Tela de músicas e cantos gregorianos no aplicativo Oratio"

- id: "pedidos-comunitarios"
  category: "Comunidade"
  title: "Pedidos de oração comunitários"
  description: "Compartilhe uma intenção com a comunidade e reze pelas necessidades apresentadas por outras pessoas, sempre com respeito e finalidade espiritual."
  image: "/assets/images/screenshots/10-pedidos-oracao-comunitarios.png"
  alt: "Tela de pedidos de oração comunitários no aplicativo Oratio"

- id: "intencoes-privadas"
  category: "Oração pessoal"
  title: "Intenções privadas"
  description: "Registre intenções pessoais e mantenha reunidos os nomes, pedidos, necessidades e agradecimentos que deseja apresentar a Deus em suas orações."
  image: "/assets/images/screenshots/11-intencoes-privadas.png"
  alt: "Tela de intenções privadas no aplicativo Oratio"

- id: "intencoes-do-papa"
  category: "Igreja"
  title: "Intenções mensais do Papa"
  description: "Conheça as intenções confiadas mensalmente pelo Papa à Igreja e una sua oração às necessidades da evangelização e do mundo."
  image: "/assets/images/screenshots/12-intencoes-do-papa.png"
  alt: "Tela das intenções mensais do Papa no aplicativo Oratio"

- id: "wallpapers"
  category: "Conteúdo"
  title: "Wallpapers para celular"
  description: "Personalize seu celular com imagens religiosas, frases espirituais e artes inspiradas na fé católica, disponibilizadas gratuitamente no aplicativo."
  image: "/assets/images/screenshots/13-wallpapers.png"
  alt: "Tela de wallpapers para celular no aplicativo Oratio"
