# Catálogo central de orações reutilizáveis.
#
# Use a chave de cada item no campo `prayer` de qualquer seção devocional.
# Os textos deste arquivo são a fonte única utilizada pelos layouts, pela
# busca interna e pelos conteúdos demonstrativos.

sinal-da-cruz:
  title: "Sinal da Cruz"
  default_language: "pt"
  texts:
    pt: |-
      Em nome do Pai, e do Filho, e do Espírito Santo. Amém.
    la: |-
      In nomine Patris, et Filii, et Spiritus Sancti. Amen.

pai-nosso:
  title: "Pai-Nosso"
  default_language: "pt"
  url: "/oracoes/pai-nosso/"
  texts:
    pt: |-
      Pai nosso, que estais nos céus, santificado seja o vosso nome; venha a nós o vosso Reino; seja feita a vossa vontade, assim na terra como no céu.

      O pão nosso de cada dia nos dai hoje; perdoai-nos as nossas ofensas, assim como nós perdoamos a quem nos tem ofendido; e não nos deixeis cair em tentação, mas livrai-nos do mal. Amém.
    la: |-
      Pater noster, qui es in caelis: sanctificetur nomen tuum; adveniat regnum tuum; fiat voluntas tua, sicut in caelo et in terra.

      Panem nostrum quotidianum da nobis hodie; et dimitte nobis debita nostra, sicut et nos dimittimus debitoribus nostris; et ne nos inducas in tentationem; sed libera nos a malo. Amen.

ave-maria:
  title: "Ave-Maria"
  default_language: "pt"
  url: "/oracoes/ave-maria/"
  texts:
    pt: |-
      Ave Maria, cheia de graça, o Senhor é convosco; bendita sois vós entre as mulheres, e bendito é o fruto do vosso ventre, Jesus.

      Santa Maria, Mãe de Deus, rogai por nós, pecadores, agora e na hora de nossa morte. Amém.
    la: |-
      Ave Maria, gratia plena, Dominus tecum; benedicta tu in mulieribus, et benedictus fructus ventris tui, Iesus.

      Sancta Maria, Mater Dei, ora pro nobis peccatoribus, nunc et in hora mortis nostrae. Amen.

gloria-ao-pai:
  title: "Glória ao Pai"
  default_language: "pt"
  url: "/oracoes/gloria-ao-pai/"
  texts:
    pt: |-
      Glória ao Pai, ao Filho e ao Espírito Santo. Como era no princípio, agora e sempre. Amém.
    la: |-
      Gloria Patri, et Filio, et Spiritui Sancto. Sicut erat in principio, et nunc, et semper, et in saecula saeculorum. Amen.

credo-dos-apostolos:
  title: "Creio"
  default_language: "pt"
  texts:
    pt: |-
      Creio em Deus Pai todo-poderoso, Criador do céu e da terra; e em Jesus Cristo, seu único Filho, nosso Senhor; que foi concebido pelo poder do Espírito Santo; nasceu da Virgem Maria, padeceu sob Pôncio Pilatos, foi crucificado, morto e sepultado; desceu à mansão dos mortos; ressuscitou ao terceiro dia; subiu aos céus; está sentado à direita de Deus Pai todo-poderoso, donde há de vir a julgar os vivos e os mortos.

      Creio no Espírito Santo; na santa Igreja Católica; na comunhão dos santos; na remissão dos pecados; na ressurreição da carne; na vida eterna. Amém.
    la: |-
      Credo in Deum Patrem omnipotentem, Creatorem caeli et terrae; et in Iesum Christum, Filium eius unicum, Dominum nostrum; qui conceptus est de Spiritu Sancto, natus ex Maria Virgine, passus sub Pontio Pilato, crucifixus, mortuus et sepultus; descendit ad inferos; tertia die resurrexit a mortuis; ascendit ad caelos; sedet ad dexteram Dei Patris omnipotentis; inde venturus est iudicare vivos et mortuos.

      Credo in Spiritum Sanctum, sanctam Ecclesiam catholicam, sanctorum communionem, remissionem peccatorum, carnis resurrectionem, vitam aeternam. Amen.

salve-rainha:
  title: "Salve-Rainha"
  default_language: "pt"
  texts:
    pt: |-
      Salve, Rainha, Mãe de misericórdia, vida, doçura e esperança nossa, salve! A vós bradamos, os degredados filhos de Eva. A vós suspiramos, gemendo e chorando neste vale de lágrimas.

      Eia, pois, advogada nossa, esses vossos olhos misericordiosos a nós volvei; e, depois deste desterro, mostrai-nos Jesus, bendito fruto do vosso ventre. Ó clemente, ó piedosa, ó doce sempre Virgem Maria.

      Rogai por nós, santa Mãe de Deus, para que sejamos dignos das promessas de Cristo. Amém.
    la: |-
      Salve, Regina, mater misericordiae; vita, dulcedo et spes nostra, salve. Ad te clamamus, exsules filii Hevae. Ad te suspiramus, gementes et flentes in hac lacrimarum valle.

      Eia ergo, advocata nostra, illos tuos misericordes oculos ad nos converte. Et Iesum, benedictum fructum ventris tui, nobis post hoc exsilium ostende. O clemens, o pia, o dulcis Virgo Maria.

      Ora pro nobis, sancta Dei Genetrix, ut digni efficiamur promissionibus Christi. Amen.

oracao-de-fatima:
  title: "Oração de Fátima"
  default_language: "pt"
  texts:
    pt: |-
      Ó meu Jesus, perdoai-nos, livrai-nos do fogo do inferno, levai as almas todas para o Céu e socorrei principalmente as que mais precisarem. Amém.
    la: |-
      O mi Iesu, dimitte nobis debita nostra, libera nos ab igne inferni, perduc in caelum omnes animas, praesertim eas quae misericordiae tuae maxime indigent. Amen.

ato-de-contricao:
  title: "Ato de Contrição"
  default_language: "pt"
  texts:
    pt: |-
      Meu Deus, porque sois infinitamente bom e vos amo de todo o meu coração, pesa-me de vos ter ofendido e, com o auxílio da vossa divina graça, proponho firmemente emendar-me e nunca mais vos tornar a ofender. Peço e espero o perdão das minhas culpas pela vossa infinita misericórdia. Amém.
    la: |-
      Deus meus, ex toto corde paenitet me omnium meorum peccatorum, eaque detestor, quia peccando, non solum poenas a te iuste statutas promeritus sum, sed praesertim quia offendi te, summum bonum, ac dignum qui super omnia diligaris. Ideo firmiter propono, adiuvante gratia tua, de cetero me non peccaturum peccandique occasiones proximas fugiturum. Amen.

vinde-espirito-santo:
  title: "Vinde, Espírito Santo"
  default_language: "pt"
  texts:
    pt: |-
      Vinde, Espírito Santo, enchei os corações dos vossos fiéis e acendei neles o fogo do vosso amor. Enviai o vosso Espírito e tudo será criado, e renovareis a face da terra.

      Oremos. Ó Deus, que instruístes os corações dos vossos fiéis com a luz do Espírito Santo, fazei que apreciemos retamente todas as coisas segundo o mesmo Espírito e gozemos sempre da sua consolação. Por Cristo, Senhor nosso. Amém.
    la: |-
      Veni, Sancte Spiritus, reple tuorum corda fidelium, et tui amoris in eis ignem accende. Emitte Spiritum tuum et creabuntur, et renovabis faciem terrae.

      Oremus. Deus, qui corda fidelium Sancti Spiritus illustratione docuisti, da nobis in eodem Spiritu recta sapere et de eius semper consolatione gaudere. Per Christum Dominum nostrum. Amen.

