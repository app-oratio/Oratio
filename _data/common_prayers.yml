# Orações específicas da Quaresma de Santa Filomena.
angelus-primeira-ave-maria-santa-filomena:
  title: "Ave Maria - 1"
  default_language: "pt"
  texts:
    pt: |-
      <span style="color: red">℣.</span> O Anjo do Senhor anunciou à Maria.
      <span style="color: red">℟.</span> E ela concebeu do Espírito Santo.
      
      Ave Maria, cheia de graça, o Senhor é convosco; bendita sois vós entre as mulheres, e bendito é o fruto do vosso ventre, Jesus.
      
      Santa Maria, Mãe de Deus, rogai por nós, pecadores, agora e na hora de nossa morte. Amém.
    la: |-
      <span style="color: red">℣.</span> Ángelus Dómini nuntiávit Mariae.
      <span style="color: red">℟.</span> Et concépit de Spiritu Sancto.
      
      Ave Maria, grátia plena, Dóminus técum.Benedícta tu in muliéribus,et benedíctus frúctus véntris tui, Iésus.Sancta Maria, Mater Dei,ora pro nóbis peccatóribus,nunc et in hora mórtis nóstrae. Amen.

angelus-segunda-ave-maria-santa-filomena:
  title: "Ave Maria - 2"
  default_language: "pt"
  texts:
    pt: |-
      <span style="color: red">℣.</span> Eis aqui a escrava do Senhor.
      <span style="color: red">℟.</span> Faça-se em mim segundo a Vossa palavra.
      
      Ave Maria, cheia de graça, o Senhor é convosco; bendita sois vós entre as mulheres, e bendito é o fruto do vosso ventre, Jesus.
      
      Santa Maria, Mãe de Deus, rogai por nós, pecadores, agora e na hora de nossa morte. Amém.
    la: |-
      <span style="color: red">℣.</span> Écce ancílla Dómini.
      <span style="color: red">℟.</span> Fiat míhi secúndum verbum túum.
      
      Ave Maria, grátia plena, Dóminus técum.Benedícta tu in muliéribus,et benedíctus frúctus véntris tui, Iésus.Sancta Maria, Mater Dei,ora pro nóbis peccatóribus,nunc et in hora mórtis nóstrae. Amen.

angelus-terceira-ave-maria-santa-filomena:
  title: "Ave Maria - 3"
  default_language: "pt"
  texts:
    pt: |-
      <span style="color: red">℣.</span> E o Verbo se fez carne.
      <span style="color: red">℟.</span> E habitou entre nós.
      
      Ave Maria, cheia de graça, o Senhor é convosco; bendita sois vós entre as mulheres, e bendito é o fruto do vosso ventre, Jesus.
      
      Santa Maria, Mãe de Deus, rogai por nós, pecadores, agora e na hora de nossa morte. Amém.
    la: |-
      <span style="color: red">℣.</span> Et Verbum caro factum est.
      <span style="color: red">℟.</span> Et habitávit in nobis.
      
      Ave Maria, grátia plena, Dóminus técum.Benedícta tu in muliéribus,et benedíctus frúctus véntris tui, Iésus.Sancta Maria, Mater Dei,ora pro nóbis peccatóribus,nunc et in hora mórtis nóstrae. Amen.

ato-de-contricao-santa-filomena:
  title: "Ato de Contrição"
  default_language: "pt"
  texts:
    pt: |-
      Dulcíssimo Jesus, Deus e Homem verdadeiro, Pai, Criador e Redentor meu, em quem creio, em quem espero e a quem amo mais do que a mim mesmo! Ó Bondade infinita, digna de ser amada acima de todas as coisas! Ah! No mais profundo de meu coração reconheço haver pecado contra Vós.
      
      Ah! Oxalá minha dor fosse tão intensa que, neste mesmo instante, meu coração se despedaçasse ao considerar quantas vezes Vos ofendi!
      
      Pesa-me, meu Deus, ter-Vos ofendido; pesa-me igualmente porque, por meus pecados, posso perder a glória do Céu e merecer as penas do inferno. Proponho firmemente, com o auxílio de Vossa graça, nunca mais tornar a pecar.
      
      Perdoai-me, Senhor, todas as minhas culpas, para que, limpa e pura, minha alma se dedique com ainda maior afinco e fervor ao Vosso santo serviço, e louve a gloriosa Virgem e Mártir Santa Filomena, minha especial advogada.
      
      Concedei-me, meu Deus, um espírito de verdadeiro fervor, para que eu a imite na fé, na esperança, na caridade e em todas as demais virtudes, a fim de que, perseverando como ela em Vos servir, possa também louvar-Vos eternamente, em sua gloriosa companhia, na bem-aventurança do Céu.
      
      Amém.
    la: |-
      Dulcissime Iesu, Deus et homo verus, Pater, Creator et Redemptor meus, in quem credo, in quem spero, et quem super meipsum diligo! O infinita Bonitas, super omnia diligenda! Ah! Ex intimo cordis mei agnosco me contra te peccasse.
      
      Utinam dolor meus tam vehemens esset, ut hoc ipso momento cor meum confringeretur, dum considero quoties te offenderim!
      
      Dolet me, Deus meus, te offendisse; dolet me etiam, quia propter peccata mea gloriam caeli amittere possum atque poenas inferni promereri. Firmiter propono, adiuvante gratia tua, numquam amplius peccare.
      
      Dimitte mihi, Domine, omnia peccata mea, ut anima mea, ab omni labe purificata, sancto servitio tuo multo maiore studio atque fervore se devoveat, atque gloriosam Virginem et Martyrem Sanctam Philomenam, peculiarem patronam meam, digne collaudet.
      
      Concede mihi, Deus meus, spiritum veri fervoris, ut eam in fide, spe, caritate ceterisque virtutibus imiter, quatenus, sicut illa in tuo servitio perseverans, te quoque in eius gloriosa societate, in caelesti beatitudine, in aeternum laudare merear.
      
      Amen.

oracao-inicial-quaresma-santa-filomena:
  title: "Oração Inicial"
  default_language: "pt"
  texts:
    pt: |-
      Ó Santa Filomena! Quão grande é a vossa alegria ao contemplardes, no Céu, a onipotência, a majestade e a grandeza de Deus!
      
      Essa alegria perdurará por toda a eternidade, enquanto Deus for Deus. Sem jamais experimentardes a menor tristeza, cantareis incessantemente, com todos os bem-aventurados, o hino de eternos louvores e de inexprimíveis delícias: Santo, Santo, Santo! Tal é o prêmio concedido à vida fervorosa com que servistes ao Senhor.
      
      E eu, ai de mim! Vejo-me sem virtudes, sem méritos, e tão exposta aos perigos desta vida. Ó minha santa padroeira! Volvei, do Céu, os vossos olhos cheios de bondade e compaixão para esta pobre e miserável criatura e, por intercessão da Santíssima Virgem Maria, alcançai-me de Jesus a graça eficaz de que necessito, para que, de agora em diante, eu O sirva com todo o fervor e possa alcançar a bem-aventurança eterna.
      
      Oh! Que grande será a vossa alegria ao ver que, por vossa poderosa intercessão, uma criatura tão esquecida e tíbia como eu se tornou verdadeiramente fervorosa! Confio, ó minha Santa, que me alcançareis essa graça, favor que de todo o coração vos suplico.
      
      <span style="color: red">(Fazer o pedido da graça.)</span>
    la: |-
      O Sancta Philomena! Quam magna est laetitia tua, dum in caelo omnipotentiam, maiestatem atque magnificentiam Dei contemplaris!
      
      Haec laetitia per omnem aeternitatem permanebit, quamdiu Deus Deus erit. Numquam vel minimam tristitiam experieris, sed una cum omnibus beatis sine intermissione hymnum aeternae laudis atque ineffabilium gaudiorum decantabis: Sanctus, Sanctus, Sanctus! Tale est praemium vitae ferventis, qua Domino fideliter servivisti.
      
      Ego autem, heu mihi! Me video virtutibus destitutum, meritis vacuum, atque inter huius vitae pericula valde expositum. O sancta patrona mea! Verte de caelo oculos tuos bonitate et misericordia plenos ad hanc pauperem ac miseram creaturam, atque, intercedente Beatissima Virgine Maria, impetra mihi a Iesu gratiam efficacem, qua indigeo, ut ex hoc tempore ei toto fervore serviam atque ad aeternam beatitudinem pervenire valeam.
      
      O quam magna erit laetitia tua, cum videbis creaturam tam neglegentem ac tepidam quam ego sum, tua potentissima intercessione vere ferventem effectam esse! Confido, o Sancta mea, te mihi hanc gratiam impetraturam esse, quam toto corde a te supplex exposco.
      
      <span style="color: red">(Fazer o pedido da graça.)</span>

oracao-final-quaresma-santa-filomena:
  title: "Oração Final"
  default_language: "pt"
  texts:
    pt: |-
      Ó Santa Filomena, minha protetora, digna da mais profunda veneração! Contemplando-vos, quer entre os sofrimentos do vosso glorioso martírio, quer revestida da coroa de glória que por ele merecestes, suplico-vos que me alcanceis de Jesus, vosso dulcíssimo Esposo, a quem tanto amastes e por quem tanto padecestes, a luz de uma fé tão viva que jamais se extinga, uma esperança tão firme que nunca desfaleça e um amor a Deus e ao próximo tão ardente que a minha vontade e o meu coração, unidos ao meu Criador e Redentor, se convertam continuamente em fervorosos atos de santa virtude.
      
      Fazei que eu aborreça de tal modo a infidelidade e o paganismo que derrame incessantemente lágrimas pela conversão dos infiéis e dos pecadores, que, sem temor de Deus, se entregam a tantas desordens. E já que vós, para jamais serdes infiel ao vosso divino Esposo, Jesus Cristo, entregastes a própria vida em meio a tantos tormentos, rogai pela salvação de todas as almas.
      
      Fazei que, animados por vossa poderosa proteção, sirvamos sempre com fervor a Jesus, nosso Salvador, e alcancemos a felicidade de um dia entrar no Céu, para Lhe render eternamente, juntamente convosco, o louvor, a ação de graças e a glória que Lhe são devidos.
      
      Amém.

ladainha-de-santa-filomena:
  title: "Ladainha de Santa Filomena"
  default_language: "pt"
  texts:
    pt: |-
      <span style="color: red">Oração opcional</span>
      
      Senhor, tende piedade de nós.
      Jesus Cristo, tende piedade de nós.
      Senhor, tende piedade de nós.
      
      Jesus Cristo, ouvi-nos.
      Jesus Cristo, atendei-nos.
      
      Pai Celeste, que sois Deus, tende piedade de nós.
      Filho, Redentor do mundo, que sois Deus, tende piedade de nós.
      Espírito Santo, que sois Deus, tende piedade de nós.
      Santíssima Trindade, que sois um só Deus, tende piedade de nós.
      
      Santa Maria, Rainha das Virgens, rogai por nós.
      
      Santa Filomena, cheia de abundantes graças desde o berço, rogai por nós.
      Santa Filomena, fiel imitadora de Maria Santíssima, rogai por nós.
      Santa Filomena, modelo das virgens, rogai por nós.
      Santa Filomena, templo da perfeita humildade, rogai por nós.
      Santa Filomena, abrasada de zelo pela glória de Deus, rogai por nós.
      Santa Filomena, vítima do amor de Jesus, rogai por nós.
      Santa Filomena, exemplo de fortaleza e perseverança, rogai por nós.
      Santa Filomena, espelho das mais excelsas virtudes, rogai por nós.
      Santa Filomena, firme e intrépida diante dos tormentos, rogai por nós.
      Santa Filomena, flagelada como o vosso Divino Esposo, rogai por nós.
      Santa Filomena, que preferistes as humilhações da morte aos esplendores do trono, rogai por nós.
      
      Santa Filomena, que convertestes as testemunhas do vosso martírio, rogai por nós.
      Santa Filomena, que cansastes o furor dos algozes, rogai por nós.
      Santa Filomena, protetora dos inocentes, rogai por nós.
      Santa Filomena, padroeira da juventude, rogai por nós.
      Santa Filomena, asilo dos desgraçados, rogai por nós.
      Santa Filomena, saúde dos enfermos, rogai por nós.
      Santa Filomena, nova luz da Igreja peregrinante, rogai por nós.
      Santa Filomena, que confundistes a impiedade do século, rogai por nós.
      Santa Filomena, cujo nome é glorioso no Céu e formidável para o inferno, rogai por nós.
      Santa Filomena, ilustre pelos mais esplêndidos milagres, rogai por nós.
      Santa Filomena, poderosíssima junto de Deus, rogai por nós.
      Santa Filomena, que reinais na glória, rogai por nós.
      
      Cordeiro de Deus, que tirais o pecado do mundo, perdoai-nos, Senhor.
      Cordeiro de Deus, que tirais o pecado do mundo, ouvi-nos, Senhor.
      Cordeiro de Deus, que tirais o pecado do mundo, tende piedade de nós.
      
      <span style="color: red">℣.</span> Rogai por nós, Santa Filomena.
      <span style="color: red">℟.</span> Para que sejamos dignos das promessas de Cristo.
      
      Oremos. Nós Vos suplicamos, Senhor, que nos concedais o perdão dos nossos pecados pela intercessão de Santa Filomena, Virgem e Mártir, que foi sempre agradável aos vossos olhos por sua eminente castidade e pelo exercício de todas as virtudes. Por nosso Senhor Jesus Cristo, vosso Filho, que é Deus, e convosco vive e reina, na unidade do Espírito Santo, por todos os séculos dos séculos.
      
      <span style="color: red">℟.</span> Amém.
      
      Santa Filomena, rogai por nós. <span style="color: red">(3 vezes)</span>
    la: |-
      <span style="color: red">Oração opcional</span>
      
      Kyrie, eleison.
      Christe, eleison.
      Kyrie, eleison.
      
      Christe, audi nos.
      Christe, exaudi nos.
      
      Pater de caelis, Deus, miserere nobis.
      Fili, Redemptor mundi, Deus, miserere nobis.
      Spiritus Sancte, Deus, miserere nobis.
      Sancta Trinitas, unus Deus, miserere nobis.
      
      Sancta Maria, Regina Virginum, ora pro nobis.
      
      Sancta Philomena, a cunabulis gratia copiose repleta, ora pro nobis.
      Sancta Philomena, fidelis Mariae imitatrix, ora pro nobis.
      Sancta Philomena, virginum exemplar, ora pro nobis.
      Sancta Philomena, templum perfectae humilitatis, ora pro nobis.
      Sancta Philomena, zelo gloriae Dei succensa, ora pro nobis.
      Sancta Philomena, victima amoris Iesu, ora pro nobis.
      Sancta Philomena, fortitudinis et perseverantiae exemplum, ora pro nobis.
      Sancta Philomena, speculum excellentissimarum virtutum, ora pro nobis.
      Sancta Philomena, inter tormenta firma et intrepida, ora pro nobis.
      Sancta Philomena, sicut Divinus Sponsus tuus flagellata, ora pro nobis.
      Sancta Philomena, quae mortis opprobria throni splendoribus praetulisti, ora pro nobis.
      
      Sancta Philomena, quae testes martyrii tui ad fidem convertisti, ora pro nobis.
      Sancta Philomena, quae furorem carnificum defatigasti, ora pro nobis.
      Sancta Philomena, innocentium patrona, ora pro nobis.
      Sancta Philomena, iuventutis patrona, ora pro nobis.
      Sancta Philomena, afflictorum asylum, ora pro nobis.
      Sancta Philomena, infirmorum salus, ora pro nobis.
      Sancta Philomena, nova lux Ecclesiae peregrinantis, ora pro nobis.
      Sancta Philomena, quae impietatem huius saeculi confudisti, ora pro nobis.
      Sancta Philomena, cuius nomen in caelo gloriosum et inferno formidabile est, ora pro nobis.
      Sancta Philomena, splendidissimis miraculis illustris, ora pro nobis.
      Sancta Philomena, apud Deum potentissima, ora pro nobis.
      Sancta Philomena, quae in gloria regnas, ora pro nobis.
      
      Agnus Dei, qui tollis peccata mundi, parce nobis, Domine.
      Agnus Dei, qui tollis peccata mundi, exaudi nos, Domine.
      Agnus Dei, qui tollis peccata mundi, miserere nobis.
      
      <span style="color: red">℣.</span> Ora pro nobis, Sancta Philomena.
      <span style="color: red">℟.</span> Ut digni efficiamur promissionibus Christi.
      
      Oremus. Quaesumus, Domine, ut nobis peccatorum nostrorum veniam concedas per intercessionem Sanctae Philomenae, Virginis et Martyris, quae tibi propter eminentissimam castitatem atque omnium virtutum exercitium semper placuit. Per Dominum nostrum Iesum Christum, Filium tuum, qui tecum vivit et regnat in unitate Spiritus Sancti, Deus, per omnia saecula saeculorum.
      
      <span style="color: red">℟.</span> Amen.
      
      Sancta Philomena, ora pro nobis. <span style="color: red">(3 vezes)</span>

coroinha-de-santa-filomena-introducao:
  title: "Coroinha de Santa Filomena"
  default_language: "pt"
  texts:
    pt: |-
      Como complemento para a Quaresma, recomenda-se a oração da Coroinha de Santa Filomena, semelhante ao terço e tradicionalmente composta por contas brancas e vermelhas.
      
      A Coroinha é opcional. Quem não desejar rezá-la pode seguir diretamente para a oração final apresentada depois desta sequência.

credo-coroinha-santa-filomena:
  title: "Credo"
  default_language: "pt"
  texts:
    pt: |-
      <span style="color: red">Na Medalha</span>
      
      Creio em Deus, Pai todo-poderoso, Criador do Céu e da Terra
      
      E em Jesus Cristo, seu único Filho, nosso Senhor que foi concebido pelo poder do Espírito Santo; nasceu da Virgem Maria; padeceu sob Pôncio Pilatos, foi crucificado, morto e sepultado; desceu à mansão dos mortos; ressuscitou ao terceiro dia; subiu aos Céus; está sentado à direita de Deus Pai todo-poderoso, de onde há-de vir a julgar os vivos e os mortos.
      
      Creio no Espírito Santo; na santa Igreja Católica; na comunhão dos Santos; na remissão dos pecados; na ressurreição da carne; e na vida eterna.
      
      Amém.

ave-maria-com-jaculatoria-santa-filomena:
  title: "Ave Maria com jaculatória"
  default_language: "pt"
  texts:
    pt: |-
      <span style="color: red">Nas contas vermelhas, rezam-se 13 Ave-Marias em louvor dos 13 anos que a Virgem Mártir viveu na terra. Após cada Ave-Maria, reza-se uma das jaculatórias indicadas.</span>
      
      Ave Maria, cheia de graça, o Senhor é convosco; bendita sois vós entre as mulheres, e bendito é o fruto do vosso ventre, Jesus.
      
      Santa Maria, Mãe de Deus, rogai por nós, pecadores, agora e na hora de nossa morte. Amém.
      
      <b>JACULATÓRIA</b>
      
      Santa Filomena, pelo sangue que derramastes por amor a Jesus Cristo, alcançai-me a graça que vos peço.
      
      <span style="color: red">ou:</span>
      
      Santa Filomena, pelo Vosso amor por Jesus e Maria, rogai por nós.

oracao-final-coroinha-santa-filomena:
  title: "Oração Final"
  default_language: "pt"
  texts:
    pt: |-
      <span style="color: red">Na Medalha triangular</span>
      
      Ó gloriosa Princesa da Corte Celestial, Santa Filomena, prostrado diante de vós, ao recordar as vossas virtudes e prodígios, minha alma engrandece o Senhor, que operou em vós tão admiráveis maravilhas de santidade.
      
      Querida Protetora, vinde em meu auxílio e conduzi-me pelos caminhos da virtude. Sede a minha fortaleza diante do inimigo infernal e alcançai-me, do Sagrado Coração de Jesus, a abundância dos auxílios divinos, que sejam para este vosso devoto saúde, paz de coração, solução para as minhas dificuldades, bem-estar para a minha família e consolo em todas as tribulações.
      
      Milagrosa Santa Filomena, em vós confio!
      
      Amém.

salve-rainha-quaresma-santa-filomena:
  title: "Salve Rainha"
  default_language: "pt"
  texts:
    pt: |-
      Salve, Rainha, mãe de misericórdia, vida, doçura, esperança nossa, salve! A Vós bradamos, os degredados filhos de Eva. A Vós suspiramos, gemendo e chorando neste vale de lágrimas. 
      
      Eia, pois, advogada nossa, esses Vossos olhos misericordiosos a nós volvei. E, depois deste desterro, nos mostrai Jesus, bendito fruto do Vosso ventre. 
      Ó clemente, ó piedosa, ó doce sempre Virgem Maria.
      
      <span style="color: red">℣.</span> Rogai por nós, Santa Mãe de Deus, 
      <span style="color: red">℟.</span> Para que sejamos dignos das promessas de Cristo. Amém.
    la: |-
      Salve, Regina, Mater misericordiae, vita, dulcedo, et spes nostra, salve. Ad te clamamus, exsules filii Evae. Ad te suspiramus, gementes et flentes in hac lacrimarum valle. 
      
      Eia ergo, advocata nostra, illos tuos misericordes oculos ad nos converte. Et Iesum benedictum fructum ventris tui, nobis, post hoc exsilium, ostende.
      O clemens, o pia, o dulcis Virgo Maria.
      
      <span style="color: red">℣.</span> Ora pro nobis Sancta Dei Génetrix.
      <span style="color: red">℟.</span> Ut digni efficiámur promissiónibus Christi. Amen.
