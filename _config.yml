# Configuração principal do portal Oratio.
# Em um repositório de projeto, use url: "https://usuario.github.io" e
# baseurl: "/nome-do-repositorio". Em domínio próprio, use baseurl: "".
title: "Oratio | App Católico"
description: "Portal oficial do Oratio, aplicativo católico de oração, liturgia e formação espiritual."
url: "https://app-oratio.github.io"
baseurl: "Oratio"
lang: "pt-BR"
locale: "pt_BR"
timezone: "America/Sao_Paulo"

author:
  name: "Equipe Oratio"

organization:
  name: "Oratio"
  apostolate: "Immaculata Mater Christi"
  logo: "/assets/images/branding/oratio-logo.png"

markdown: kramdown
kramdown:
  input: GFM
  hard_wrap: false
  syntax_highlighter: rouge

permalink: /blog/:year/:month/:title/

collections:
  oracoes:
    output: true
    permalink: /oracoes/:name/
  novenas:
    output: true
    permalink: /novenas/:name/
  quaresmas:
    output: true
    permalink: /quaresmas/:name/
  trintenas:
    output: true
    permalink: /trintenas/:name/
  devocoes_mensais:
    output: true
    permalink: /devocoes-mensais/:name/
  trezenas:
    output: true
    permalink: /trezenas/:name/
  triduos:
    output: true
    permalink: /triduos/:name/
  dias_novena:
    output: true
  tercos:
    output: true
    permalink: /tercos/:name/
  rosarios:
    output: true
    permalink: /rosarios/:name/
  coroas:
    output: true
    permalink: /coroas/:name/
  devocionarios:
    output: true
    permalink: /devocionarios/:name/
  santos:
    output: true
    permalink: /santos/:name/
  formacoes:
    output: true
    permalink: /formacoes/:name/

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      author: "Equipe Oratio"
      image: "/assets/images/social/og-default.webp"
  - scope:
      path: ""
      type: oracoes
    values:
      layout: prayer
  - scope:
      path: ""
      type: novenas
    values:
      layout: novena
      devotion_type: "Novena"
  - scope:
      path: ""
      type: quaresmas
    values:
      layout: novena
      devotion_type: "Quaresma"
  - scope:
      path: ""
      type: trintenas
    values:
      layout: novena
      devotion_type: "Trintena"
  - scope:
      path: ""
      type: devocoes_mensais
    values:
      layout: novena
      devotion_type: "Devoção mensal"
  - scope:
      path: ""
      type: trezenas
    values:
      layout: novena
      devotion_type: "Trezena"
  - scope:
      path: ""
      type: triduos
    values:
      layout: novena
      devotion_type: "Tríduo"
  - scope:
      path: ""
      type: dias_novena
    values:
      layout: novena-day
  - scope:
      path: ""
      type: tercos
    values:
      layout: counted-prayer
      prayer_beads_type: "Terço"
  - scope:
      path: ""
      type: rosarios
    values:
      layout: counted-prayer
      prayer_beads_type: "Rosário"
  - scope:
      path: ""
      type: coroas
    values:
      layout: counted-prayer
      prayer_beads_type: "Coroa"
  - scope:
      path: ""
      type: devocionarios
    values:
      layout: devotional
  - scope:
      path: ""
      type: santos
    values:
      layout: saint
  - scope:
      path: ""
      type: formacoes
    values:
      layout: formation

plugins:
  - jekyll-seo-tag
  - jekyll-feed

feed:
  path: feed.xml

sass:
  style: compressed

# Arquivos que não fazem parte do site publicado.
exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - GUIA_DE_IMPLEMENTACAO.md
  - LICENSE
  - CNAME.example
  - tools
  - vendor
  - node_modules

include:
  - .well-known

strict_front_matter: true
